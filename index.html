<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   
    <header class="header">
        <div class="logo">
            🔍 <span>FindIt</span>
        </div>
    </header>

  
    <div class="tabs">
        <button class="active">All Items</button>
        <button>Lost Items</button>
        <button>Found Items</button>
    </div>


    <div class="search-section">
        <input type="text" placeholder="Search Items">
        <select>
            <option>Category</option>
            <option>Wallet</option>
            <option>Phone</option>
            <option>ID</option>
        </select>
    </div>

   
    <div class="container">

        <div class="item-card">

            <div class="item-image">
                <img src="https://images.unsplash.com/photo-1627123424574-724758594e93?w=800"
                    alt="Wallet">
            </div>

            <div class="item-info">

                <div class="tags">
                    <span class="lost">Lost</span>
                    <span class="category">Wallet</span>
                </div>

                <h2>Black Leather Wallet</h2>

                <p>
                    Lost near the community center.
                    Contains ID and credit cards.
                </p>

                <div class="details">
                    <p>📍 Community Center</p>
                    <p>📅 2026-06-05</p>
                    <p>👤 John Smith</p>
                </div>

                <div class="buttons">
                    <button class="contact-btn">
                        Contact Owner
                    </button>

                    <button class="post-btn">
                        + Post Item
                    </button>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
